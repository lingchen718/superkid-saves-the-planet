name: Build pygbag web bundle

on:
  push:
    branches: [ main ]

# Pages needs explicit permissions to write the deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Cancel any in-flight run when a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ─── 1. Install pygbag (memory recall: 0.9.2 is the older fallback
      #         that predates the 0.9.3 browserfs.min.js CDN double-slash bug) ───
      - name: Install pygbag (with fallback chain)
        run: |
          python -m pip install --upgrade pip
          if python -m pip install --upgrade --force-reinstall pygbag==0.9.2; then
            echo "PIP_VERSION_STATUS=ok"
          else
            python -m pip install --upgrade --force-reinstall \
              "git+https://github.com/pygame-web/pygbag.git"
            echo "PIP_VERSION_STATUS=git_source"
          fi
          python -m pip show pygbag | head -3

      # ─── 2. Discover where pygbag's templates actually live ───
      - name: Locate pygbag templates
        id: locate_templates
        run: |
          PKG_DIR="$(python -c 'import pygbag, os; print(os.path.dirname(pygbag.__file__))')"
          echo "PKG_DIR=$PKG_DIR"
          # Find any .html / .tmpl inside the package
          find "$PKG_DIR" -maxdepth 4 -type f \
            \( -name '*.html' -o -name '*.tmpl' \) 2>/dev/null \
            | tee /tmp/template_files.txt
          echo "TEMPLATE_COUNT=$(wc -l < /tmp/template_files.txt)" >> "$GITHUB_OUTPUT"

      # ─── 3. Pre-bundle pygbag CDN assets locally
      #         Memory recall: "download missing CDN files into project root
      #         and patch the template index.html script src tags to point
      #         at local files. Pattern: search the template index.html
      #         for any <script src> or <link href> pointing to
      #         pygame-web.github.io/cdn and replace with relative paths." ───
      - name: Patch pygbag template CDN URLs → local
        run: |
          if [ ! -s /tmp/template_files.txt ]; then
            echo "No template files found — patch skipped."
            exit 0
          fi

          # 1. Collect CDN URLs referenced in templates
          ASSETS=$(xargs cat < /tmp/template_files.txt \
                    | grep -hoE "https?://pygame-web\.github\.io/cdn[^'\" )\`]+" \
                    | sort -u || true)

          if [ -z "$ASSETS" ]; then
            echo "No CDN URLs in templates — patch is a no-op."
          else
            echo "CDN URLs to pre-bundle:"
            echo "$ASSETS"

            # 2. Download each asset
            echo "$ASSETS" | while IFS= read -r url; do
              [ -z "$url" ] && continue
              fname="${url##*/}"
              if curl -fsSL "$url" -o "$fname"; then
                echo "fetched $fname"
              else
                echo "FAILED to fetch $url"
              fi
            done

            # 3. Patch templates to use relative paths
            echo "$ASSETS" | while IFS= read -r url; do
              [ -z "$url" ] && continue
              fname="${url##*/}"
              while IFS= read -r tf; do
                [ -f "$tf" ] && sed -i "s|${url}|./${fname}|g" "$tf"
              done < /tmp/template_files.txt
              echo "rewrote ${url} → ./${fname}"
            done

            # 4. Sanity check
            echo "remaining CDN refs in templates:"
            xargs cat < /tmp/template_files.txt \
              | grep -E "pygame-web\.github\.io/cdn" || echo "  (none)"
          fi

      # ─── 4. Make sure project root has a pygbag.ini ───
      # Memory recall: "pygbag build does not have a pygbag.ini configuration file"
      - name: Create pygbag.ini if missing
        run: |
          cat > pygbag.ini <<'INI'
          [pygbag]
          name = Super Kid Saves the Planet
          main = main.py
          INI
          cat pygbag.ini

      # ─── 5. Build ───
      - name: Build web bundle
        run: |
          pygbag --build .

      - name: Pre-flight check
        run: |
          ls -la build/web | head -30
          test -f build/web/index.html && echo "✓ index.html present"

      # ─── 6. Copy locally-bundled CDN assets into the build folder
      #         (so the rewritten templates can load them at runtime) ───
      - name: Copy local CDN assets into bundle
        run: |
          mkdir -p build/web
          for f in *.min.js *.wasm; do
            [ -f "$f" ] && cp -v "$f" build/web/
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
