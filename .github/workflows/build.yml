name: Build pygbag web bundle

on:
  push:
    branches: [ main ]

# Pages needs explicit permissions to write the deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Cancel any in-flight run when a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------
      # Memory note (verified three times across this thread):
      #
      #   - 'pip install --upgrade pygbag' once silently left the env at
      #     a version with broken CDN URLs. Pinning explicitly + printing
      #     the installed version is the cheap cure.
      #   - Pygbag 0.9.x is likely all affected by some CDN 404 issue
      #     depending on the exact version. Treat the CDN as unreliable.
      #
      # Strategy used here:
      #   1. Force-reinstall pygbag==0.9.2 (the older-but-working pin).
      #      If PyPI rejects it for any reason, we fall through to the
      #      dev source build.
      #   2. After install, scan pygbag's templates for any URL pointing
      #      at `pygame-web.github.io/cdn`, download those assets to
      #      ./ and rewrite the template to use relative paths.
      #
      # That makes the build independent of the CDN at runtime.
      # ------------------------------------------------------------------
      - name: Install pygbag (force-reinstall, pinned)
        id: install_pygbag
        run: |
          python -m pip install --upgrade pip
          if python -m pip install --upgrade --force-reinstall pygbag==0.9.2; then
            echo "Installed pygbag 0.9.2 from PyPI"
          else
            # Fallback: dev source build per memory recall
            python -m pip install --upgrade --force-reinstall \
              "git+https://github.com/pygame-web/pygbag.git"
            echo "Installed pygbag from source as fallback"
          fi
          python -c "import pygbag, os; print('version=', pygbag.__version__); \
                     print('templates=', os.path.dirname(pygbag.__file__))"

      # ------------------------------------------------------------------
      # Manual CDN patch (memory recall #3).
      # ------------------------------------------------------------------
      - name: Pre-bundle pygbag CDN assets locally
        run: |
          set -e
          TMPL_DIR="$(python -c 'import pygbag, os; print(os.path.dirname(pygbag.__file__))')/templates"
          echo "pygbag template dir: $TMPL_DIR"
          ls "$TMPL_DIR"

          # 1. Collect every CDN URL the templates reference.
          ASSETS=$(grep -hoE "https?://pygame-web\.github\.io/cdn[^'\" )\`]+" \
                     "$TMPL_DIR"/*.html "$TMPL_DIR"/*.tmpl \
                     "$TMPL_DIR"/*.css "$TMPL_DIR"/*.js 2>/dev/null \
                   | sort -u || true)
          if [ -z "$ASSETS" ]; then
            echo "No CDN references found — patch step is a no-op."
          else
            echo "CDN references found:"
            echo "$ASSETS"

            # 2. Download each asset into the project root.
            echo "$ASSETS" | while IFS= read -r url; do
              [ -z "$url" ] && continue
              fname="${url##*/}"
              echo "fetching $url -> $fname"
              if ! curl -fsSL "$url" -o "$fname"; then
                echo "  (curl failed for $url, skipping)"
                rm -f "$fname"
              fi
            done

            # 3. Rewrite template URLs to local relative paths.
            echo "$ASSETS" | while IFS= read -r url; do
              [ -z "$url" ] && continue
              fname="${url##*/}"
              echo "rewriting $url -> ./$fname"
              # Update template files
              find "$TMPL_DIR" -maxdepth 3 -type f \
                \( -name '*.html' -o -name '*.tmpl' \
                   -o -name '*.css'  -o -name '*.js' \) \
                -print0 | xargs -0 -n1 \
                  sed -i.bak "s|${url}|./${fname}|g" || true
            done
          fi

          # Sanity check — print what still references the CDN.
          echo "Templates still referencing the CDN:"
          grep -rE "pygame-web\.github\.io/cdn" "$TMPL_DIR" || echo "  (none)"

      - name: Build web bundle
        run: |
          pygbag --version 2>/dev/null || true
          pygbag --build .

      - name: Inspect build output
        run: |
          echo "build/web contents:"
          ls -la build/web | head -40
          test -f build/web/index.html && echo "index.html present."

      # ------------------------------------------------------------------
      # Stash assets we downloaded into the bundle too — the rewritten
      # template will load `browserfs.min.js` etc. by relative URL.
      # ------------------------------------------------------------------
      - name: Copy local CDN assets into the bundle
        run: |
          for f in browserfs.min.js pygame_*.js pygame_*.wasm pygame*.data *.js *.wasm 2>/dev/null; do
            [ -f "$f" ] || continue
            mkdir -p build/web
            cp -v "$f" build/web/
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
