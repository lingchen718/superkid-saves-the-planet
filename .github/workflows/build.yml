name: Build pygbag web bundle

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Memory: pip install --upgrade silently keeps 0.9.3 (the buggy one).
      # Always --force-reinstall pygbag==0.9.2.
      - name: Install pygbag
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall pygbag==0.9.2
          pip show pygbag | head -3 || true
      
      
      
      
      
      

      - name: Build web bundle
        run: |
          rm -rf build/
          pygbag --build .

      - name: Verify bundle
        run: |
          echo "PWD: $(pwd)"
          ls -la build/ || (echo "build/ missing"; exit 1)
          ls -la build/web/ || (echo "build/web/ missing"; exit 1)
          test -f build/web/index.html && echo "index.html present" \
            || (echo "index.html MISSING"; exit 1)

      # Memory anchor: download CDN files into project root and rewrite
      # index.html script src to point at local files.
      - name: Pre-bundle CDN runtime assets
        run: python patch_cdn.py

      - name: Final sanity check
        run: |
          echo "---- bundle/web/ contents ----"
          ls -la build/web/
          ls -la build/web/vt/ 2>/dev/null || echo "(no vt subdir)"

          echo "---- remaining CDN refs ----"
          REMAINING="$(grep -oE "https?://pygame-web\.github\.io/archives/0\.9/[^\"' )]+" \
                       build/web/index.html 2>/dev/null | sort -u || true)"
          if [ -n "$REMAINING" ]; then
            echo "FAIL: index.html still references the CDN:"
            echo "$REMAINING"
            exit 1
          else
            echo "all local — iPad safe"
          fi


      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
