name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git \
            libncurses6 openjdk-17-jdk-headless \
            unzip zip wget \
            zlib1g-dev

      - name: Install buildozer
        run: pip install buildozer cython

      # NEW STEP GOES HERE
      - name: Pre-accept Android SDK licenses
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROIDSDK/licenses"
          cat > "$ANDROIDSDK/licenses/android-sdk-license" << 'EOF'

8933bad161af4178b1185d1a37fbf41ea5269c55

d56f5187479451eabf01fb78af6dfcb131a6481e

24333f8a63b6825ea9c5514f83c2829b004d1fee
EOF
          cat > "$ANDROIDSDK/licenses/android-sdk-preview-license" << 'EOF'

84831b9409646a918e30573bab4c9c91346d8abd
EOF
          cat > "$ANDROIDSDK/licenses/android-googletv-license" << 'EOF'

601085b94cd77f0b54ff86406957099ebe79c4d6
EOF
          cat > "$ANDROIDSDK/licenses/android-sdk-arm-dbt-license" << 'EOF'

859f317696f67ef3d7f30a50a5560e7834b43903
EOF
          cat > "$ANDROIDSDK/licenses/google-gdk-license" << 'EOF'

33b6a2b64607f11b759f320ef9dff4ae5c47d97a
EOF
          cat > "$ANDROIDSDK/licenses/mips-android-sysimage-license" << 'EOF'

e9acab5b5fbb560a72cfaecce8946896ff6aab9d
EOF
          echo "Licenses pre-accepted"

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
          if-no-files-found: error
