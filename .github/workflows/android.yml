name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libncurses6 openjdk-17-jdk-headless unzip zip wget zlib1g-dev autoconf automake libtool libtool-bin pkg-config gettext m4 bison flex

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Pre-accept Android SDK licenses
        run: |
          python3 -c "
          import os
          sdk_root = os.path.expanduser('~/.buildozer/android/platform/android-sdk')
          os.makedirs(os.path.join(sdk_root, 'licenses'), exist_ok=True)
          with open(os.path.join(sdk_root, 'licenses', 'android-sdk-license'), 'w') as f:
              f.write('\n8933bad161af4178b1185d1a37fbf41ea5269c55\n\nd56f5187479451eabf01fb78af6dfcb131a6481e\n\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n')
          with open(os.path.join(sdk_root, 'licenses', 'android-sdk-preview-license'), 'w') as f:
              f.write('\n84831b9409646a918e30573bab4c9c91346d8abd\n')
          print('Licenses pre-accepted')
          "

      - name: Install Android cmdline-tools
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROIDSDK/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools "$ANDROIDSDK/cmdline-tools/latest"
          echo "cmdline-tools installed"

      - name: Create sdkmanager symlink for buildozer
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROIDSDK/tools/bin"
          ln -sf "$ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager" "$ANDROIDSDK/tools/bin/sdkmanager"
          ls -la "$ANDROIDSDK/tools/bin/"
          echo "Symlink created"

      - name: Download and install libtool m4 macros manually
        run: |
          mkdir -p /tmp/custom-aclocal
          cd /tmp
          wget -q https://ftp.gnu.org/gnu/libtool/libtool-2.4.7.tar.gz -O libtool.tar.gz
          if [ ! -s libtool.tar.gz ]; then
            wget -q https://github.com/autotools-mirror/libtool/archive/refs/tags/v2.4.7.tar.gz -O libtool.tar.gz
          fi
          if [ -s libtool.tar.gz ]; then
            tar -xzf libtool.tar.gz
            find . -name "*.m4" 2>/dev/null | grep -i libtool | xargs -I {} cp {} /tmp/custom-aclocal/ 2>/dev/null || true
            # Get any m4 file that mentions LT_ macros
            find . -name "*.m4" 2>/dev/null | xargs -I {} sh -c 'grep -l "LT_" "{}" 2>/dev/null' | xargs -I {} cp {} /tmp/custom-aclocal/ 2>/dev/null || true
            # Just copy ALL m4 files we can find
            find . -name "*.m4" 2>/dev/null | xargs -I {} cp {} /tmp/custom-aclocal/ 2>/dev/null || true
            echo "=== Total m4 files in custom-aclocal: ==="
            ls /tmp/custom-aclocal/ | wc -l
            echo "=== Sample of m4 files: ==="
            ls /tmp/custom-aclocal/ | head -20
            # Check for the specific macro we need
            if grep -q "LT_SYS_SYMBOL_USCORE" /tmp/custom-aclocal/*.m4 2>/dev/null; then
              echo "LT_SYS_SYMBOL_USCORE found in installed m4 files!"
            else
              echo "WARNING: LT_SYS_SYMBOL_USCORE not found"
            fi
          else
            echo "Failed to download libtool source - will try system locations"
            find /usr -name "*.m4" 2>/dev/null | xargs -I {} cp {} /tmp/custom-aclocal/ 2>/dev/null || true
            echo "Total m4 from system: $(ls /tmp/custom-aclocal/ | wc -l)"
          fi
        continue-on-error: true

      - name: Build APK with verbose output
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROIDSDK"
          export PATH="$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools:$PATH"
          export ACLOCAL_PATH="/tmp/custom-aclocal:/usr/share/aclocal"
          yes | sdkmanager --licenses
          for i in 1 2 3; do
            echo "=== Build attempt $i ==="
            buildozer -v android debug 2>&1 | tee build.log && break
            echo "Build attempt $i failed, retrying in 30 seconds..."
            sleep 30
          done
          echo "=== Last 300 lines of build log ==="
          tail -n 300 build.log
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
