name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libncurses6 openjdk-17-jdk-headless unzip zip wget zlib1g-dev autoconf automake libtool libtool-bin pkg-config gettext m4 bison flex

      - name: Force Python package versions with PIP_CONSTRAINT
        run: |
          cat > /tmp/constraints.txt << 'EOF'
          setuptools==65.5.0
          sh>=1.10,<2.0
          cython==0.29.36
          buildozer==1.5.0
          python-for-android==2024.1.21
          Pillow>=10.0,<11.0
          EOF
          cat /tmp/constraints.txt
        env:
          PIP_CONSTRAINT: /tmp/constraints.txt

      - name: Download and patch python-for-android source
        run: |
          cd /tmp
          pip download --no-deps --no-binary :all: "python-for-android==2024.1.21" -d p4a-source
          cd p4a-source
          tar -xzf python-for-android-*.tar.gz
          cd python-for-android-2024.1.21
          # Find every file that mentions Pillow==11 and patch it
          grep -rl "Pillow==11" pythonforandroid/ 2>/dev/null | while read f; do
            echo "Patching: $f"
            sed -i 's|Pillow==11\.[0-9]*\.[0-9]*|Pillow==10.4.0|g' "$f"
            sed -i 's|"Pillow>=11|"Pillow>=10|g' "$f"
            sed -i 's|"Pillow>11|"Pillow>=10|g' "$f"
          done
          # Also patch Pillow 11.x version specifications
          grep -rl "Pillow>=11\|Pillow>11" pythonforandroid/ 2>/dev/null | while read f; do
            echo "Patching Pillow range: $f"
            sed -i 's|Pillow>=11|Pillow>=10|g' "$f"
            sed -i 's|Pillow>11|Pillow>=10|g' "$f"
          done
          # Show what we patched
          grep -rn "Pillow" pythonforandroid/recipes/pillow/ 2>/dev/null
          # Reinstall from the patched source
          pip install --no-deps .


      - name: Install buildozer with manual dependency control
        run: |
          pip install --upgrade pip

          echo "=== Pre-install all the package-only dependencies ==="
          pip install --no-deps "buildozer==1.5.0"
          pip install --no-deps "cython==0.29.36"
          pip install --no-deps "python-for-android==2024.1.21"
          pip install --no-deps "Pillow>=10.0,<11.0"

          echo "=== Patching python-for-android pillow recipe ==="
          P4A_PATH=$(python3 -c "import pythonforandroid; print(pythonforandroid.__path__[0])")
          find $P4A_PATH -name "*.py" | xargs grep -l "Pillow" 2>/dev/null | while read f; do
            echo "Found Pillow reference in: $f"
            sed -i 's|Pillow==11\.[0-9]*\.[0-9]*|Pillow==10.4.0|g' "$f"
          done

          echo "=== Installing transitive dependencies manually ==="
          pip install --upgrade-strategy only-if-needed "virtualenv"
          pip install --upgrade-strategy only-if-needed "colorama"
          pip install --upgrade-strategy only-if-needed "jinja2"
          pip install --upgrade-strategy only-if-needed "build"
          pip install --upgrade-strategy only-if-needed "toml"
          pip install --upgrade-strategy only-if-needed "packaging"
          pip install --upgrade-strategy only-if-needed "filelock"
          pip install --upgrade-strategy only-if-needed "appdirs"
          pip install --upgrade-strategy only-if-needed "pexpect"
          pip install --upgrade-strategy only-if-needed "ptyprocess"
          pip install --upgrade-strategy only-if-needed "docutils"
          pip install --upgrade-strategy only-if-needed "pyparsing"
          pip install --upgrade-strategy only-if-needed "Cython"

          echo "=== FINAL LOCK: force-reinstall sh and setuptools ==="
          pip install --upgrade --force-reinstall "sh==1.14.3"
          pip install --upgrade --force-reinstall "setuptools==65.5.0"

          echo "=== Final installed versions: ==="
          pip show setuptools sh python-for-android buildozer Pillow virtualenv | grep -E "Name|Version"
      
      
      - name: Patch python-for-android to use compatible Pillow version
        run: |
          P4A_PATH=$(python3 -c "import pythonforandroid; print(pythonforandroid.__path__[0])")
          echo "python-for-android path: $P4A_PATH"
          
          # Find the pillow recipe and patch its version
          PILLOW_RECIPE="$P4A_PATH/recipes/pillow/__init__.py"
          if [ -f "$PILLOW_RECIPE" ]; then
            echo "Patching pillow recipe..."
            cat "$PILLOW_RECIPE"
            # Replace any '11.x' version with '10.4.0'
            sed -i 's|Pillow==11\.[0-9]*\.[0-9]*|Pillow==10.4.0|g' "$PILLOW_RECIPE"
            sed -i 's|"Pillow >= 11|"Pillow >= 10|g' "$PILLOW_RECIPE"
            echo "After patching:"
            cat "$PILLOW_RECIPE"
          else
            echo "No pillow recipe found, trying alternate locations"
            find $P4A_PATH -name "*pillow*" -type f
          fi


      - name: Pre-accept Android SDK licenses
        run: |
          python3 -c "
          import os
          sdk_root = os.path.expanduser('~/.buildozer/android/platform/android-sdk')
          os.makedirs(os.path.join(sdk_root, 'licenses'), exist_ok=True)
          with open(os.path.join(sdk_root, 'licenses', 'android-sdk-license'), 'w') as f:
              f.write('\n8933bad161af4178b1185d1a37fbf41ea5269c55\n\nd56f5187479451eabf01fb78af6dfcb131a6481e\n\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n')
          with open(os.path.join(sdk_root, 'licenses', 'android-sdk-preview-license'), 'w') as f:
              f.write('\n84831b9409646a918e30573bab4c9c91346d8abd\n')
          print('Licenses pre-accepted')
          "

      - name: Install Android cmdline-tools
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROIDSDK/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools "$ANDROIDSDK/cmdline-tools/latest"
          echo "cmdline-tools installed"

      - name: Create sdkmanager symlink for buildozer
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$ANDROIDSDK/tools/bin"
          ln -sf "$ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager" "$ANDROIDSDK/tools/bin/sdkmanager"
          ls -la "$ANDROIDSDK/tools/bin/"
          echo "Symlink created"

      - name: Install libtool m4 macros
        run: |
          sudo mkdir -p /usr/share/aclocal
          cd /tmp
          # Try GitHub mirror FIRST (most reliable from GitHub runners)
          echo "Trying GitHub mirror..."
          wget -q --tries=3 --timeout=60 https://github.com/autotools-mirror/libtool/archive/refs/tags/v2.4.7.tar.gz -O libtool.tar.gz
          if [ ! -s libtool.tar.gz ]; then
            echo "GitHub mirror failed, trying GNU..."
            wget -q --tries=3 --timeout=60 https://ftp.gnu.org/gnu/libtool/libtool-2.4.7.tar.gz -O libtool.tar.gz
          fi
          if [ ! -s libtool.tar.gz ]; then
            echo "Trying Savannah mirror..."
            wget -q --tries=3 --timeout=60 https://download.savannah.gnu.org/releases/libtool/libtool-2.4.7.tar.gz -O libtool.tar.gz
          fi
          if [ -s libtool.tar.gz ]; then
            echo "Downloaded libtool source, extracting..."
            tar -xzf libtool.tar.gz
            echo "=== Files extracted: ==="
            ls -la | grep libtool
            find . -name "libtool.m4" -o -name "lt*.m4" 2>/dev/null | xargs -I {} sudo cp {} /usr/share/aclocal/
            echo "=== Files in /usr/share/aclocal: ==="
            ls /usr/share/aclocal/ | wc -l
            echo "libtool m4 macros installed"
          else
            echo "ERROR: All download sources failed"
            exit 1
          fi


      - name: Build APK with verbose output
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROIDSDK"
          export PATH="$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools:$PATH"
          yes | sdkmanager --licenses
          for i in 1 2 3; do
            echo "=== Build attempt $i ==="
            buildozer -v android debug 2>&1 | tee build.log && break
            echo "Build attempt $i failed, retrying..."
            sleep 30
          done
          echo "=== Last 300 lines of build log ==="
          tail -n 300 build.log
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
